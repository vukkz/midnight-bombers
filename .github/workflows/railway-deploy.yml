name: Deploy to Railway

on:
  push:
    branches:
      - master
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway redeploy
        env:
          RAILWAY_DEPLOY_HOOK: ${{ secrets.RAILWAY_DEPLOY_HOOK }}
        run: |
          if [ -z "$RAILWAY_DEPLOY_HOOK" ]; then
            echo "RAILWAY_DEPLOY_HOOK secret not set — skipping."
            echo "Railway will still auto-deploy if GitHub integration is connected to master."
            exit 0
          fi
          curl -fsSL -X POST "$RAILWAY_DEPLOY_HOOK"
          echo "Railway deploy triggered."
